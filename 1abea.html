<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beach Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --sky-top:#1a5f8a;
    --sky-mid:#4a9bc4;
    --sky-horizon:#bfe4f0;
    --sand-light:#f6efdc;
    --sand-mid:#e8dcb8;
    --sand-shadow:#d9c99a;
    --sea-deep:rgba(9,74,110,0.85);
    --sea-mid:rgba(41,120,163,0.65);
    --sea-shallow:rgba(120,190,210,0.45);
    --foam:rgba(255,255,255,0.85);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
  }
  .scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
  }

  /* SKY */
  .sky{
    position:absolute;
    top:0;left:0;right:0;
    height:58%;
    background:linear-gradient(180deg,
      var(--sky-top) 0%,
      var(--sky-mid) 55%,
      var(--sky-horizon) 100%);
  }
  .sun-glow{
    position:absolute;
    top:8%;
    right:14%;
    width:140px;height:140px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,250,230,0.95) 0%, rgba(255,250,230,0.35) 40%, rgba(255,250,230,0) 70%);
    filter:blur(1px);
  }
  .cloud{
    position:absolute;
    background:rgba(255,255,255,0.55);
    border-radius:50px;
    filter:blur(2px);
    opacity:0.8;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:inherit;
    border-radius:50%;
  }
  .cloud1{ width:120px; height:34px; top:12%; left:8%; animation: driftCloud 90s linear infinite; }
  .cloud1::before{ width:60px; height:60px; top:-28px; left:15px; }
  .cloud1::after{ width:50px; height:50px; top:-20px; left:55px; }
  .cloud2{ width:90px; height:26px; top:20%; left:60%; animation: driftCloud 130s linear infinite; }
  .cloud2::before{ width:44px; height:44px; top:-20px; left:10px; }
  .cloud2::after{ width:38px; height:38px; top:-16px; left:42px; }

  @keyframes driftCloud{
    0%{ transform:translateX(-10vw); }
    100%{ transform:translateX(110vw); }
  }

  /* BOAT */
  .boat-wrap{
    position:absolute;
    top:47%;
    left:62%;
    width:70px;
    height:80px;
    transform-origin:50% 90%;
    animation: bobBoat 4.2s ease-in-out infinite;
    z-index:5;
  }
  @keyframes bobBoat{
    0%,100%{ transform: translateY(0) rotate(-2.5deg); }
    50%{ transform: translateY(-6px) rotate(2.5deg); }
  }
  .boat-wrap svg{ width:100%; height:100%; overflow:visible; }

  /* SEA */
  .sea{
    position:absolute;
    top:52%;
    left:0;right:0;bottom:0;
    background:linear-gradient(180deg,
      var(--sea-shallow) 0%,
      var(--sea-mid) 35%,
      var(--sea-deep) 100%);
  }

  /* SAND */
  .sand{
    position:absolute;
    left:0;right:0;bottom:0;
    height:26%;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(ellipse at 75% 70%, rgba(0,0,0,0.04), transparent 55%),
      linear-gradient(180deg, var(--sand-light) 0%, var(--sand-mid) 55%, var(--sand-shadow) 100%);
    clip-path: polygon(0 30%, 100% 12%, 100% 100%, 0 100%);
  }

  /* WAVE LAYERS crossing sand/sea boundary for wash effect */
  .wave-layer{
    position:absolute;
    left:-10%;
    width:120%;
    height:60px;
  }
  .wave-layer svg{ width:100%; height:100%; display:block; }

  .wave1{ bottom:22%; animation: waveShift 7s ease-in-out infinite; opacity:0.9; }
  .wave2{ bottom:19%; animation: waveShift 9s ease-in-out infinite reverse; opacity:0.7; }
  .wave3{ bottom:24.5%; animation: waveShift 5.5s ease-in-out infinite; opacity:0.55; }

  @keyframes waveShift{
    0%{ transform: translateX(0) translateY(0); }
    50%{ transform: translateX(-3%) translateY(3px); }
    100%{ transform: translateX(0) translateY(0); }
  }

  /* Deep sea ripple texture */
  .ripples{
    position:absolute;
    top:52%; left:0; right:0; bottom:26%;
    background-image: repeating-linear-gradient(
      100deg,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 2px,
      transparent 2px,
      transparent 40px
    );
    animation: rippleDrift 6s linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes rippleDrift{
    0%{ background-position-x:0; }
    100%{ background-position-x:200px; }
  }

  /* Controls */
  .controls{
    position:absolute;
    bottom:22px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:14px;
    align-items:center;
    z-index:20;
  }
  .sound-btn{
    width:52px;height:52px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 18px rgba(0,0,0,0.15);
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .sound-btn:hover{ background:rgba(255,255,255,0.4); transform:scale(1.05); }
  .sound-btn svg{ width:24px;height:24px; }

  .easypagex-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:14px 26px;
    border-radius:999px;
    background:rgba(255,255,255,0.28);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    color:#0b3a52;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.02em;
    text-decoration:none;
    box-shadow:0 4px 18px rgba(0,0,0,0.15);
    border:1px solid rgba(255,255,255,0.4);
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .easypagex-btn:hover{ background:rgba(255,255,255,0.45); transform:translateY(-2px); }
</style>
</head>
<body>
<div class="scene">
  <div class="sky">
    <div class="sun-glow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
  </div>

  <div class="boat-wrap">
    <svg viewBox="0 0 70 80">
      <!-- hull -->
      <path d="M14 62 Q35 74 56 62 L50 68 Q35 76 20 68 Z" fill="#3a2a20"/>
      <!-- mast -->
      <line x1="35" y1="62" x2="35" y2="12" stroke="#4a3626" stroke-width="2"/>
      <!-- mainsail -->
      <path d="M36 14 L36 60 L60 58 Z" fill="#fdfaf3" stroke="#e4ddc9" stroke-width="1"/>
      <!-- jib -->
      <path d="M34 20 L34 58 L16 55 Z" fill="#f2ece0" stroke="#e4ddc9" stroke-width="1"/>
    </svg>
  </div>

  <div class="sea"></div>
  <div class="ripples"></div>

  <div class="wave-layer wave1">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
      <path d="M0,30 C150,10 300,50 450,30 C600,10 750,50 900,30 C1050,10 1200,50 1200,30 L1200,60 L0,60 Z" fill="rgba(255,255,255,0.55)"/>
    </svg>
  </div>
  <div class="wave-layer wave2">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
      <path d="M0,35 C200,15 400,55 600,35 C800,15 1000,55 1200,35 L1200,60 L0,60 Z" fill="rgba(255,255,255,0.65)"/>
    </svg>
  </div>
  <div class="wave-layer wave3">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none">
      <path d="M0,25 C180,45 320,5 500,25 C680,45 820,5 1000,25 C1100,35 1150,20 1200,25 L1200,60 L0,60 Z" fill="rgba(255,255,255,0.8)"/>
    </svg>
  </div>

  <div class="sand"></div>

  <div class="controls">
    <button class="sound-btn" id="soundToggle" aria-label="Toggle wave sound">
      <svg id="soundIcon" viewBox="0 0 24 24" fill="none" stroke="#0b3a52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 9 3 15 8 15 13 20 13 4 8 9 3 9"></polygon>
        <path d="M16 8a5 5 0 0 1 0 8"></path>
        <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
      </svg>
    </button>
    <a href="#" id="easypagexBtn" class="easypagex-btn" target="_blank" rel="noopener noreferrer">EasyPageX</a>
  </div>
</div>

<script>
  // ---- Procedural ocean wave sound (Web Audio API, no external files) ----
  let audioCtx, noiseSource, filterNode, gainNode, lfo, lfoGain, isPlaying = false;

  function buildWaveSound(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Pink-ish noise buffer, looped
    const bufferSize = audioCtx.sampleRate * 4;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < bufferSize; i++){
      const white = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + white*0.0555179;
      b1 = 0.99332*b1 + white*0.0750759;
      b2 = 0.96900*b2 + white*0.1538520;
      b3 = 0.86650*b3 + white*0.3104856;
      b4 = 0.55000*b4 + white*0.5329522;
      b5 = -0.7616*b5 - white*0.0168980;
      const pink = b0+b1+b2+b3+b4+b5+b6+white*0.5362;
      b6 = white*0.115926;
      data[i] = pink * 0.11;
    }

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = buffer;
    noiseSource.loop = true;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = "lowpass";
    filterNode.frequency.value = 700;
    filterNode.Q.value = 0.7;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.0;

    // LFO to swell the filter cutoff & gain like waves rolling in/out
    lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.14; // slow swell
    lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 380;
    lfo.connect(lfoGain);
    lfoGain.connect(filterNode.frequency);

    const lfoGain2 = audioCtx.createGain();
    lfoGain2.gain.value = 0.16;
    const lfoForVolume = audioCtx.createOscillator();
    lfoForVolume.frequency.value = 0.14;
    lfoForVolume.connect(lfoGain2);
    lfoGain2.connect(gainNode.gain);

    noiseSource.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    noiseSource.start(0);
    lfo.start(0);
    lfoForVolume.start(0);

    // fade in base gain
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 2);
  }

  const soundBtn = document.getElementById('soundToggle');
  const soundIcon = document.getElementById('soundIcon');

  const mutedPath = `
    <line x1="1" y1="1" x2="23" y2="23"></line>
    <path d="M9 9v6h4l5 5V4.5L13.5 9H9z"></path>
  `;
  const unmutedPath = `
    <polygon points="3 9 3 15 8 15 13 20 13 4 8 9 3 9"></polygon>
    <path d="M16 8a5 5 0 0 1 0 8"></path>
    <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
  `;

  soundBtn.addEventListener('click', () => {
    if (!audioCtx){
      buildWaveSound();
      isPlaying = true;
      soundIcon.innerHTML = unmutedPath;
      return;
    }
    if (isPlaying){
      audioCtx.suspend();
      isPlaying = false;
      soundIcon.innerHTML = mutedPath;
    } else {
      audioCtx.resume();
      isPlaying = true;
      soundIcon.innerHTML = unmutedPath;
    }
  });
</script>
</body>
</html>
